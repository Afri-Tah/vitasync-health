<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VitaSync AI — Personal Health Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background: #050816;
  color: white;
  overflow-x: hidden;
}
h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
}

.gradient-text {
  background: linear-gradient(to right, #22d3ee, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.bg-grid {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.pulse { animation: pulse 3s infinite; }
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="bg-grid"></div>

<!-- CHAT MODAL -->
<div id="chatModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
  <div class="glass rounded-[30px] p-8 w-[90%] max-w-xl">
    <div class="flex justify-between mb-6">
      <h2 class="text-2xl font-bold">VitaSync AI</h2>
      <button onclick="closeChat()">✕</button>
    </div>

    <div class="bg-black/40 p-4 rounded-2xl mb-4">
      Hello! Ask me anything about your health.
    </div>

    <div class="flex gap-3">
      <input id="chatInput" class="flex-1 bg-black/40 p-3 rounded-2xl" placeholder="Ask..." />
      <button onclick="sendChat()" class="bg-cyan-500 text-black px-4 rounded-2xl">Send</button>
    </div>
  </div>
</div>

<div class="max-w-7xl mx-auto px-6 py-10">

<!-- HEADER -->
<div class="flex justify-between items-center mb-10">
  <div>
    <p class="text-cyan-400 uppercase tracking-widest text-sm">AI Health System</p>
    <h1 class="text-6xl font-bold gradient-text">VitaSync AI</h1>
  </div>

  <button onclick="openChat()" class="bg-cyan-500 text-black px-6 py-3 rounded-2xl font-semibold">
    AI Assistant
  </button>
</div>

<!-- INPUT -->
<div class="glass p-6 rounded-3xl mb-6 grid md:grid-cols-4 gap-4">
  <input id="sleep" type="number" value="7" class="p-3 bg-black/40 rounded-xl" placeholder="Sleep">
  <input id="water" type="number" value="1.5" class="p-3 bg-black/40 rounded-xl" placeholder="Water">
  <select id="stress" class="p-3 bg-black/40 rounded-xl">
    <option>Low</option>
    <option selected>Moderate</option>
    <option>High</option>
  </select>
  <input id="steps" type="number" value="6000" class="p-3 bg-black/40 rounded-xl" placeholder="Steps">
</div>

<button onclick="updateDashboard()" class="bg-cyan-500 text-black px-6 py-3 rounded-2xl mb-10">
  Update Dashboard
</button>

<!-- DASHBOARD -->
<div class="grid lg:grid-cols-3 gap-6">

<!-- HEALTH -->
<div class="glass p-6 rounded-3xl">
  <h2 class="text-2xl font-bold mb-4">Health Score</h2>
  <div class="text-5xl font-bold" id="healthScore">82%</div>
</div>

<!-- CHART -->
<div class="glass p-6 rounded-3xl lg:col-span-2">
  <canvas id="healthChart"></canvas>
</div>

</div>

<!-- FOOD -->
<div class="glass p-6 rounded-3xl mt-6">
  <h2 class="text-2xl font-bold mb-4">Food Tracker</h2>

  <div class="flex gap-3">
    <input id="foodName" class="bg-black/40 p-3 rounded-xl flex-1" placeholder="Food">
    <input id="foodCalories" type="number" class="bg-black/40 p-3 rounded-xl w-32" placeholder="Cal">
    <button onclick="addFood()" class="bg-cyan-500 text-black px-4 rounded-xl">Add</button>
  </div>

  <div id="foodList" class="mt-4 space-y-2"></div>
</div>

<!-- JOURNAL -->
<div class="glass p-6 rounded-3xl mt-6">
  <h2 class="text-2xl font-bold mb-4">Mood Journal</h2>
  <textarea id="journal" class="w-full bg-black/40 p-4 rounded-xl" rows="4"></textarea>
  <button onclick="saveJournal()" class="mt-3 bg-cyan-500 text-black px-4 py-2 rounded-xl">Save</button>
</div>

</div>

<script>

function updateDashboard() {
  let sleep = +document.getElementById('sleep').value;
  let water = +document.getElementById('water').value;
  let stress = document.getElementById('stress').value;
  let steps = +document.getElementById('steps').value;

  let score = 50;
  if (sleep >= 7) score += 15;
  if (water >= 2) score += 10;
  if (steps > 6000) score += 15;
  if (stress === "Low") score += 10;

  document.getElementById('healthScore').innerText = score + "%";
  chart.data.datasets[0].data.push(score);
  chart.update();
}

function addFood() {
  let name = document.getElementById('foodName').value;
  let cal = document.getElementById('foodCalories').value;

  let div = document.createElement('div');
  div.className = "bg-black/40 p-3 rounded-xl";
  div.innerText = `${name} - ${cal} kcal`;

  document.getElementById('foodList').appendChild(div);
}

function saveJournal() {
  localStorage.setItem("journal", document.getElementById("journal").value);
  alert("Saved!");
}

function openChat() {
  document.getElementById("chatModal").style.display = "flex";
}

function closeChat() {
  document.getElementById("chatModal").style.display = "none";
}

function sendChat() {
  alert("AI: Improve sleep and hydration.");
}

// CHART
const ctx = document.getElementById('healthChart');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
    datasets: [{
      label: 'Health Score',
      data: [70,75,72,80,82,78,85],
      borderColor: '#22d3ee'
    }]
  }
});

</script>

</body>
</html>
